name: Build and Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

concurrency:
  group: release-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/claude-workstation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive metadata
        id: meta
        shell: bash
        run: |
          IMAGE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image_version=$IMAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Validate VERSION matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Assert tag is on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish (tag release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            IMAGE_VERSION=${{ steps.meta.outputs.image_version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.image_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
